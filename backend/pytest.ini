[pytest]
asyncio_mode = auto
testpaths = tests
env =
    DATABASE_URL=postgresql://roamio_user:roamio_pass@localhost:5432/roamio_db
    SECRET_KEY=test-secret-key-for-pytest-must-be-at-least-32-chars-long
    WATSONX_API_KEY=test-watsonx-api-key
    WATSONX_PROJECT_ID=test-watsonx-project-id
    WATSONX_URL=https://us-south.ml.cloud.ibm.com
    WATSONX_MODEL_ID=ibm/granite-13b-chat-v2
