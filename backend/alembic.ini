# ==============================================================================
# Alembic Configuration — Roamio Backend
# ==============================================================================
# The sqlalchemy.url value here is a placeholder.
# The real DATABASE_URL is injected programmatically in alembic/env.py from
# app.core.config.settings — so this value is never used in practice.
# It exists only to satisfy Alembic's parser.
# ==============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .

# Placeholder — overridden in env.py via settings.DATABASE_URL
sqlalchemy.url = postgresql://user:pass@localhost/roamio_db

# File format for new migration scripts
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S